name: dbt CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ~/.dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-postgres  # change adapter if needed

      - name: Install dbt project dependencies
        run: dbt deps

      - name: Compile dbt project
        run: dbt compile

      - name: Run dbt models and tests
        run: dbt build