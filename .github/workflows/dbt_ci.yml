
name: dbt CI

on:
  push:
    branches: [ "**" ]
  pull_request: 
    branches: [ "**" ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: .dbt
      BIGQUERY_KEYFILE_JSON: ${{ secrets.BIGQUERY_KEYFILE_JSON }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery adapter)
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-bigquery

      - name: Create dbt profiles directory
        run: mkdir -p .dbt

      - name: Write profiles.yml
        run: |
          cat <<EOF > .dbt/profiles.yml
${{ secrets.DBT_PROFILES_YML }}
EOF

      - name: Verify profiles.yml (debug)
        run: |
          echo "Checking profiles file..."
          cat .dbt/profiles.yml

      - name: Install dbt dependencies
        run: dbt deps

      - name: Run dbt build (models + tests)
        run: dbt build