name: dbt CI

on:
  push:
  pull_request:

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: .dbt
      BIGQUERY_KEYFILE_JSON: ${{ secrets.BIGQUERY_KEYFILE_JSON }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt BigQuery
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-bigquery

      - name: Create profiles directory
        run: mkdir -p .dbt

      - name: Write profiles.yml
        run: |
          cat <<EOF > .dbt/profiles.yml
${{ secrets.DBT_PROFILES_YML }}
EOF

      - name: Show profiles.yml (debug)
        run: cat .dbt/profiles.yml

      - name: Install dependencies
        run: dbt deps

      - name: Run dbt build (runs models + tests)
        run: dbt build --debug