version: 2

models: 

  - name: amenities_impact
    description: "Analysis of how different amenities impact occupancy for listings."
    columns:
      - name: amenity
        description: "Name of the amenity (e.g., Wi-Fi, Air Conditioning, Kitchen)."
        tests:
          - not_null
      - name: occupancy_rate
        description: "Average occupancy rate for listings that include this amenity."
        tests:
          - not_null

  - name: listing_performance_metrics
    description: "Key performance metrics per listing (review score ratings)"
    columns:
      - name: listing_id
        tests: 
          - not_null
      - name: occupancy_rate
        description: "Proportion of days the listing was unavailable"
      - name: avg_rating
        description: "Average review score rating"
      - name: avg_accuracy
        description: "Average accuracy rating"
      - name: avg_cleanliness
        description: "Average cleanliness rating"
      - name: avg_checkin
        description: "Average check-in rating"
      - name: avg_communication
        description: "Average communication rating"
      - name: avg_location
        description: "Average location rating"
      - name: avg_value
        description: "Average value rating"

  - name: listing_monthly_metrics
    description: "Aggregated monthly occupancy metrics by listing."
    columns:
      - name: month
        description: "Calendar date truncated to the month level."
        tests:
          - not_null
      - name: listing_id
        description: "Unique identifier for the listing."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings')
                field: listing_id
      - name: neighbourhood
        description: "Neighborhood where the listing is located."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings')
                field: neighbourhood
      - name: property_type
        description: "Type of property (e.g., Apartment, House, Condo)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings')
                field: property_type
      - name: room_type
        description: "Type of room offered (e.g., Entire home/apt, Private room, Shared room)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings')
                field: room_type
      - name: num_nights_booked
        description: "Total number of nights the listing was booked during the month."
      - name: num_total_nights
        description: "Total number of nights in the month for this listing (usually 28–31 nights depending on month)."
      - name: occupancy_rate
        description: "Calculated occupancy rate for the month."

  - name: monthly_reviews
    description: "Review volume per month across all listings."
    columns:
      - name: review_month
        tests: 
            - not_null
      - name: review_count
        description: "Total reviews received in the given month"