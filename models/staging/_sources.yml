version: 2

sources:
  - name: airbnb_data
    database: airbnb-495108
    schema: airbnb_data
    tables:
      - name: calendar
        description: "This table contains information about calendar-based availability and pricing for Airbnb listings."
        columns:
          - name: listing_id
            description: Unique identifier for an Airbnb listing.
            tests:
              - not_null
          - name: date
            description: The date for which the listing information is recorded.
            tests:
              - not_null
          - name: available
            description: Indicates whether the listing is available on the given date.
            tests:
              - not_null
          - name: price
            description: The price of the listing for the given date.
          - name: adjusted_price
            description: The adjusted price of the listing, taking into account any discounts or promotions.
          - name: minimum_nights
            description: The minimum number of nights required for a booking.
            tests:
              - not_null
          - name: maximum_nights
            description: The maximum number of nights allowed for a booking.
            tests:
              - not_null