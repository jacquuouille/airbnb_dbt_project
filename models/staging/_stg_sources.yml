version: 2

models:
  - name: stg_calendar
    description: Cleaned and typed staging model for calendar-based availability and pricing.
    columns:
      - name: listing_id
        description: Unique identifier (INT64) for an Airbnb listing.
        tests:
          - not_null
      - name: calendar_date
        description: The date (DATE) for which the listing information is recorded.
        tests:
          - not_null
      - name: is_available
        description: Indicates whether the listing is available (BOOLEAN) on the given date.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["true", "false"]
      - name: price
        description: The price (FLOAT64) of the listing for the given date.
      - name: adjusted_price
        description: The adjusted price (FLOAT64) of the listing, taking into account any discounts or promotions.
      - name: minimum_nights
        description: The minimum number of nights (INT64) required for a booking.
        tests:
          - not_null
      - name: maximum_nights
        description: The maximum number of nights (INT64) allowed for a booking.
        tests:
          - not_null
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns: ['listing_id', 'calendar_date']

  - name: stg_listings
    description: Cleaned and typed staging model for detailed listing-level data including host attributes, pricing, availability, and guest reviews.
    columns: 
      - name: listing_id
        description: "Unique identifier for the listing."
        tests:
          - not_null
          - unique
      - name: listing_name
        description: "Title of the listing as displayed on the platform."
        tests:
          - not_null
      - name: listing_description
        description: "Detailed description of the listing."
      - name: neighbourhood
        description: "Standardized neighbourhood where the listing is located."
      - name: latitude
        description: "Latitude coordinate of the listing location."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        description: "Longitude coordinate of the listing location."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -180
                max_value: 180
      - name: property_type
        description: "Type of property (e.g., apartment, house)."
      - name: room_type
        description: "Type of room offered (entire home, private room, shared room)."
      - name: accommodates
        description: "Maximum number of guests the listing can accommodate."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: bathrooms
        description: "Number of bathrooms available in the listing."
      - name: bedrooms
        description: "Number of bedrooms in the listing."
      - name: beds
        description: "Number of beds available."
      - name: amenities
        description: "List of amenities provided with the listing."
      - name: minimum_nights
        description: "Average minimum number of nights required for booking."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: maximum_nights
        description: "Average maximum number of nights allowed for booking."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: availability_365
        description: "Number of days the listing is available over the next 365 days."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 365
      - name: listing_url
        description: "URL link to the Airbnb listing."
        tests:
          - not_null
          - unique
      - name: last_scraped
        description: "Date when the listing data was last scraped."
        tests:
          - not_null
      - name: host_id
        description: "Unique identifier of the host associated with the listing."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host ID should not be null, but some listings may have missing host information."
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns: ['listing_id', 'listing_url', 'host_id']