version: 2

models:
  - name: stg_calendar
    description: Cleaned and typed staging model for calendar-based availability and pricing.
    columns:
      - name: listing_id
        description: "Unique identifier for an Airbnb listing."
        tests:
          - not_null
      - name: calendar_date
        description: "The date for which the listing information is recorded."
        tests:
          - not_null
      - name: is_available
        description: "Indicates whether the listing is available (BOOLEAN) on the given date."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["true", "false", "unknown"]
      - name: price
        description: "The price of the listing for the given date."
      - name: adjusted_price
        description: "The adjusted price of the listing, taking into account any discounts or promotions."
      - name: minimum_nights
        description: "The minimum number of nights required for a booking."
        tests:
          - not_null
      - name: maximum_nights
        description: "The maximum number of nights allowed for a booking."
        tests:
          - not_null
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns: ['listing_id', 'calendar_date']

  - name: stg_listings
    description: "Cleaned and typed staging model for detailed listing-level data including host attributes, pricing, availability, and guest reviews."
    columns: 
      - name: listing_id
        description: "Unique identifier for the listing."
        tests:
          - not_null
          - unique
      - name: listing_name
        description: "Title of the listing as displayed on the platform."
        tests:
          - not_null
      - name: listing_description
        description: "Detailed description of the listing."
      - name: neighborhood
        description: "Standardized neighborhood where the listing is located."
      - name: latitude
        description: "Latitude coordinate of the listing location."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        description: "Longitude coordinate of the listing location."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -180
                max_value: 180
      - name: property_type
        description: "Type of property (e.g., apartment, house)."
      - name: room_type
        description: "Type of room offered (entire home, private room, shared room)."
      - name: accommodates
        description: "Maximum number of guests the listing can accommodate."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: bathrooms
        description: "Number of bathrooms available in the listing."
      - name: bedrooms
        description: "Number of bedrooms in the listing."
      - name: beds
        description: "Number of beds available."
      - name: amenities
        description: "List of amenities provided with the listing."
      - name: minimum_nights
        description: "Average minimum number of nights required for booking."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: maximum_nights
        description: "Average maximum number of nights allowed for booking."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: availability_365
        description: "Number of days the listing is available over the next 365 days."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 365
      - name: review_scores_rating
        description: "Overall rating score for the listing."
      - name: review_scores_accuracy
        description: "Rating score for accuracy of the listing description."
      - name: review_scores_cleanliness
        description: "Rating score for cleanliness of the listing."
      - name: review_scores_checkin
        description: "Rating score for the check-in experience."
      - name: review_scores_communication
        description: "Rating score for host communication."
      - name: review_scores_location
        description: "Rating score for location."
      - name: review_scores_value
        description: "Rating score representing value for money."
      - name: listing_url
        description: "URL link to the Airbnb listing."
        tests:
          - not_null
          - unique
      - name: last_scraped
        description: "Date when the listing data was last scraped."
        tests:
          - not_null
      - name: host_id
        description: "Unique identifier of the host associated with the listing."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host ID should not be null, but some listings may have missing host information."
          - relationships:
              arguments:
                to: ref('stg_hosts')
                field: host_id
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns: ['listing_id', 'listing_url', 'host_id']

  - name: stg_hosts
    description: "Staging model containing cleaned and standardized host-level information from Airbnb listings."
    columns:
      - name: host_id
        description: "Unique identifier of the host."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host ID should not be null, but some listings may have missing host information."
          - unique
      - name: host_name
        description: "Name of the host as displayed on the platform."
      - name: hosts_time_as_user_years
        description: "Number of years the host has been a user on the platform."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host time as user in years should not be null, but some hosts may have missing information."
      - name: hosts_time_as_user_months
        description: "Number of months the host has been a user on the platform."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host time as user in months should not be null, but some hosts may have missing information."
      - name: hosts_time_as_host_years
        description: "Number of years the host has been hosting."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host time as host in years should not be null, but some hosts may have missing information."
      - name: hosts_time_as_host_months
        description: "Number of months the host has been hosting."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host time as host in months should not be null, but some hosts may have missing information."
      - name: host_location
        description: "Self-reported location of the host."
      - name: host_about
        description: "Free-text description written by the host."
      - name: host_listings_count
        description: "Number of listings currently managed by the host."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: host_identity_verified
        description: "Indicates whether the host's identity has been verified."
        tests:
          - accepted_values:
              arguments:
                values: ["true", "false", "unknown"]
      - name: host_profile_url
        description: "URL to the host's Airbnb profile page."
        tests:
          - not_null:
              config:
                severity: warn
                description: "Host profile URL should not be null, but some hosts may have missing profile information."
          # unique: some host_ids may share the same profile URL if they are co-hosts or if the data has inconsistencies. --- IGNORE ---

  - name: stg_reviews
    description: "Staging model containing cleaned and standardized review-level information from Airbnb listings."
    columns:
      - name: listing_id
        description: "Identifier of the listing being reviewed."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_listings')
                field: listing_id
      - name: review_id
        description: "Unique identifier of the review."
        tests:
          - not_null
          - unique
      - name: reviewer_id
        description: "Unique identifier of the reviewer."
        tests:
          - not_null
      - name: reviewer_name
        description: "Name of the reviewer as displayed on the platform."
      - name: review_date
        description: "Date when the review was posted."
        tests:
          - not_null
      - name: review_comments
        description: "Text content of the written review."
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns: ['review_id', 'listing_id', 'reviewer_id']